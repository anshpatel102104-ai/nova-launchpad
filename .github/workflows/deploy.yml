name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  migrate:
    name: Run Supabase Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Reconcile migration history
        # All pre-squash migrations were applied directly to production via the
        # Supabase dashboard and are represented by the squash file. Mark them
        # applied so db push only runs migrations added after the squash.
        run: |
          for v in \
            20260422075843 20260422075900 20260422185038 \
            20260423055721 20260423055740 20260423173016 \
            20260423174303 20260423174336 20260423175609 \
            20260423195043 20260425063354 \
            20260428174811 20260428174824 \
            20260429203640 20260429203712 \
            20260429220000 20260429220500 20260429225621 \
            20260429225635 20260429225652 20260429225758 \
            20260429225851 20260429230000 20260429230301 \
            20260430052516 20260430052547 20260430052713 \
            20260504224413 \
            20260505162951 20260505165803 20260505170109 \
            20260505170156 20260505194546 \
            20260506000000 20260506000001 20260506000002 \
            20260506000003 20260506000004 20260506000005 \
            20260506000006 20260508000001 \
            20260508183635 \
            20260511000001 20260511000002 \
            20260512000001 20260512000002 \
            20260512152647 20260512152651 \
            20260512152937 20260512152942 \
            20260513000001 20260513180806 \
            20260513180830 20260513194544 \
            20260521153617 20260521160701 \
            20260521160907 20260521160937 \
            20260521161020 20260521161700 \
            20260516000000 \
            20260525000001 20260525000002 \
            20260527000001 20260527000002; do
            supabase migration repair --status applied "$v" || true
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run pending migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-edge-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    environment: production
    needs: migrate
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy all Edge Functions
        run: supabase functions deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-cloudflare-proxy:
    name: Deploy n8n Proxy Worker
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install proxy dependencies
        working-directory: cloudflare/n8n-proxy
        run: bun install --frozen-lockfile

      - name: Deploy Cloudflare Worker
        working-directory: cloudflare/n8n-proxy
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-main-app:
    name: Deploy Main App to Cloudflare Workers
    runs-on: ubuntu-latest
    environment: production
    needs: [migrate, deploy-edge-functions]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build app
        run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_PAYMENTS_CLIENT_TOKEN: ${{ secrets.VITE_PAYMENTS_CLIENT_TOKEN }}
          VITE_N8N_BASE_URL: /api/n8n

      - name: Deploy to Cloudflare Workers
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

# ─── Required GitHub Secrets ──────────────────────────────────────────────
# SUPABASE_ACCESS_TOKEN          — Supabase Dashboard → Account → Access Tokens
# SUPABASE_PROJECT_ID            — ipidfqwlszuhjgjygbvx
# CLOUDFLARE_API_TOKEN           — Cloudflare Dashboard → My Profile → API Tokens
# CLOUDFLARE_ACCOUNT_ID          — Cloudflare Dashboard → right sidebar
# VITE_SUPABASE_URL              — https://ipidfqwlszuhjgjygbvx.supabase.co
# VITE_SUPABASE_PUBLISHABLE_KEY  — Supabase anon public key
# VITE_SUPABASE_PROJECT_ID       — ipidfqwlszuhjgjygbvx
# VITE_PAYMENTS_CLIENT_TOKEN     — Stripe publishable key
