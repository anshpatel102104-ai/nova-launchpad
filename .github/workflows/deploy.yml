name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  migrate:
    name: Run Supabase Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Reconcile migration history
        # The remote DB has applied migration versions that have no corresponding
        # local file (applied out-of-band via the connector). `supabase db push`
        # aborts when remote history references versions it can't find locally.
        # Dynamically mark every remote-applied version that lacks a local file as
        # `reverted`, so db push only considers the local migration files.
        run: |
          set -euo pipefail
          # Version prefixes of local migration files (14-digit timestamps).
          local_versions=$(ls supabase/migrations/*.sql 2>/dev/null \
            | xargs -n1 basename \
            | grep -oE '^[0-9]{14}' \
            | sort -u)
          # Remote-applied versions (robust against table-format changes: just
          # pull every 14-digit timestamp out of the listing).
          remote_versions=$(supabase migration list --linked 2>/dev/null \
            | grep -oE '[0-9]{14}' \
            | sort -u)
          # Any remote version with no local file -> revert it from remote tracking.
          for v in $remote_versions; do
            if ! echo "$local_versions" | grep -qx "$v"; then
              echo "Reverting orphan remote migration: $v"
              supabase migration repair --status reverted "$v" || true
            fi
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run pending migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-edge-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    environment: production
    needs: migrate
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy all Edge Functions
        run: supabase functions deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-main-app:
    name: Deploy Main App to Cloudflare Workers
    runs-on: ubuntu-latest
    environment: production
    # The frontend does not depend on the edge functions, so a transient
    # edge-function bundling hiccup (e.g. esm.sh timeout) must not block the app
    # deploy. Gate only on migrations.
    needs: [migrate]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build app
        run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_PAYMENTS_CLIENT_TOKEN: ${{ secrets.VITE_PAYMENTS_CLIENT_TOKEN }}

      - name: Deploy to Cloudflare Workers
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

# ─── Required GitHub Secrets ──────────────────────────────────────────────
# SUPABASE_ACCESS_TOKEN          — Supabase Dashboard → Account → Access Tokens
# SUPABASE_PROJECT_ID            — ipidfqwlszuhjgjygbvx
# CLOUDFLARE_API_TOKEN           — Cloudflare Dashboard → My Profile → API Tokens
# CLOUDFLARE_ACCOUNT_ID          — Cloudflare Dashboard → right sidebar
# VITE_SUPABASE_URL              — https://ipidfqwlszuhjgjygbvx.supabase.co
# VITE_SUPABASE_PUBLISHABLE_KEY  — Supabase anon public key
# VITE_SUPABASE_PROJECT_ID       — ipidfqwlszuhjgjygbvx
# VITE_PAYMENTS_CLIENT_TOKEN     — Stripe publishable key
