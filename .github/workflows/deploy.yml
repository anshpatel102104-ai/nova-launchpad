name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  migrate:
    name: Run Supabase Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run pending migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-edge-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    environment: production
    needs: migrate
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy all Edge Functions
        run: supabase functions deploy --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-cloudflare-proxy:
    name: Deploy n8n Proxy Worker
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install proxy dependencies
        working-directory: cloudflare/n8n-proxy
        run: bun install --frozen-lockfile

      - name: Deploy Cloudflare Worker
        working-directory: cloudflare/n8n-proxy
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

# ─── Required GitHub Secrets ──────────────────────────────────────────────
# SUPABASE_ACCESS_TOKEN   — Supabase Dashboard → Account → Access Tokens
# SUPABASE_PROJECT_ID     — ipidfqwlszuhjgjygbvx
# CLOUDFLARE_API_TOKEN    — Cloudflare Dashboard → My Profile → API Tokens
# CLOUDFLARE_ACCOUNT_ID   — Cloudflare Dashboard → right sidebar
# VITE_SUPABASE_URL       — https://ipidfqwlszuhjgjygbvx.supabase.co
# VITE_SUPABASE_PUBLISHABLE_KEY  — Supabase anon public key
# VITE_SUPABASE_PROJECT_ID       — ipidfqwlszuhjgjygbvx
# VITE_PAYMENTS_CLIENT_TOKEN     — Stripe publishable key
