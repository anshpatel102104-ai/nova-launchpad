name = "nova-n8n-proxy"
main = "src/worker.ts"
compatibility_date = "2026-01-15"

# Bind your routes after `npx wrangler deploy`.
# Example: routes = [{ pattern = "nova-ops.space/api/n8n/*", zone_name = "nova-ops.space" }]

[vars]
N8N_UPSTREAM = "https://n8n.nova-ops.space"

# Set via: npx wrangler secret put N8N_PROXY_SECRET
# This is the shared secret n8n verifies via X-Proxy-Secret header.
