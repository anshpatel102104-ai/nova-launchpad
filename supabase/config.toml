# AI tool functions — verify_jwt = true adds gateway-level auth before the
# function runs. The functions also validate internally for defence-in-depth.
[functions.validate-idea]
verify_jwt = true

[functions.analyze-website]
verify_jwt = true

[functions.kill-my-idea]
verify_jwt = true

[functions.run-tool]
verify_jwt = true

[functions.save-integration]
verify_jwt = true

[functions.generate-ai-dashboard]
verify_jwt = true

[functions.nova-chat]
verify_jwt = true

[functions.manage-subscription]
verify_jwt = true

[functions.list-invoices]
verify_jwt = true

[functions.create-checkout]
verify_jwt = true

# Stripe calls this without a Supabase JWT — must remain public
[functions.payments-webhook]
verify_jwt = false

# Memory query — answers questions against the org's indexed artifacts
[functions.memory-query]
verify_jwt = true

# Feedback loop — scheduled every 30 minutes to detect repeated tool runs
# and generate prompt improvement suggestions.
[functions.feedback-loop]
verify_jwt = false
schedule = "*/30 * * * *"

