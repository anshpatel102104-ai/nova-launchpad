# AI tool functions — verify_jwt = true adds gateway-level auth before the
# function runs. The functions also validate internally for defence-in-depth.
[functions.validate-idea]
verify_jwt = true

[functions.analyze-website]
verify_jwt = true

[functions.kill-my-idea]
verify_jwt = true

[functions.run-tool]
verify_jwt = true

[functions.save-integration]
verify_jwt = true

[functions.generate-ai-dashboard]
verify_jwt = true

[functions.nova-chat]
verify_jwt = true

[functions.manage-subscription]
verify_jwt = true

[functions.list-invoices]
verify_jwt = true

[functions.create-checkout]
verify_jwt = true

# Stripe calls this without a Supabase JWT — must remain public
[functions.payments-webhook]
verify_jwt = false

# Memory query — answers questions against the org's indexed artifacts
[functions.memory-query]
verify_jwt = true

# Feedback loop — detects repeated tool runs and generates prompt improvement
# suggestions. Invoked every 30 minutes via the pg_cron job defined in
# supabase/migrations/20260606000002_feedback_loop_cron.sql
[functions.feedback-loop]
verify_jwt = false


# Server-side onboarding completion saga — org + workspace + mission + context
# created atomically. Replaces the client-orchestrated chain in onboarding.tsx.
[functions.complete-onboarding]
verify_jwt = true

# Weekly Operating Review — user-invoked (JWT) or cron (service role).
# Internal auth check distinguishes the two; gateway JWT off so cron can call.
[functions.weekly-review]
verify_jwt = false
